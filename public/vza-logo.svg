<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <!-- VZA shared-stroke ligature: the central diagonal is simultaneously the Z's
       diagonal, the V's right stroke, and the A's left stroke. Free ends sit at the
       longest length whose caps survive a circular avatar crop (endpoint <= 396 from
       center). 180-degree rotational symmetry about (500,500) -->
  <path d="M 164 300 L 380 750 M 620 250 L 836 700 M 380 250 H 620 L 380 750 H 620" fill="none" stroke="#00897b" stroke-width="100" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Head in the V's notch: raised-arms reading, focal start of the V-Z-A scan -->
  <circle cx="380" cy="430" r="58" fill="#f9a602"/>
</svg>
